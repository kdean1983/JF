<svg width="210" height="50" viewBox="0 0 210 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
      @keyframes w1 {
        0%    { opacity: 1; }
        16%   { opacity: 1; }
        20%   { opacity: 0; }
        96%   { opacity: 0; }
        100%  { opacity: 1; }
      }
      @keyframes w2 {
        0%    { opacity: 0; }
        16%   { opacity: 0; }
        20%   { opacity: 1; }
        36%   { opacity: 1; }
        40%   { opacity: 0; }
        100%  { opacity: 0; }
      }
      @keyframes w3 {
        0%    { opacity: 0; }
        36%   { opacity: 0; }
        40%   { opacity: 1; }
        56%   { opacity: 1; }
        60%   { opacity: 0; }
        100%  { opacity: 0; }
      }
      @keyframes w4 {
        0%    { opacity: 0; }
        56%   { opacity: 0; }
        60%   { opacity: 1; }
        76%   { opacity: 1; }
        80%   { opacity: 0; }
        100%  { opacity: 0; }
      }
      @keyframes w5 {
        0%    { opacity: 0; }
        76%   { opacity: 0; }
        80%   { opacity: 1; }
        96%   { opacity: 1; }
        100%  { opacity: 0; }
      }
      .spinner  { transform-origin: 25px 25px; animation: spin 2.4s linear infinite; }
      .spinner2 { transform-origin: 25px 25px; animation: spin-slow 5s linear infinite; }
      .lw { animation: w1 10s ease-in-out infinite; }
      .la { animation: w2 10s ease-in-out infinite; }
      .li { animation: w3 10s ease-in-out infinite; }
      .lt { animation: w4 10s ease-in-out infinite; }
      .lh { animation: w5 10s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        .spinner,.spinner2,.lw,.la,.li,.lt,.lh { animation: none; opacity: 1; }
      }
    </style>
  </defs>

  <g class="spinner2">
    <circle cx="25" cy="25" r="22" fill="none" stroke="#3C3489" stroke-width="1"
      stroke-dasharray="4 7" stroke-linecap="round" opacity="0.6"/>
  </g>
  <circle cx="25" cy="25" r="17" fill="none" stroke="#3C3489" stroke-width="4.5" opacity="0.3"/>
  <g class="spinner" filter="url(#glow)">
    <circle cx="25" cy="25" r="17" fill="none" stroke="#7F77DD" stroke-width="4.5"
      stroke-dasharray="70 107" stroke-linecap="round" opacity="0.95"/>
  </g>

  <g class="lw">
    <text x="25" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="5.5" font-weight="700" fill="#7F77DD" letter-spacing="1" opacity="0.95">WAIT</text>
    <circle cx="18" cy="30" r="2.5" fill="#534AB7" filter="url(#glow)"/>
    <circle cx="25" cy="30" r="2.5" fill="#534AB7" filter="url(#glow)"/>
    <circle cx="32" cy="30" r="2.5" fill="#534AB7" filter="url(#glow)"/>
  </g>
  <g class="la" opacity="0">
    <text x="25" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="5.5" font-weight="700" fill="#7F77DD" letter-spacing="1" opacity="0.95">JUST</text>
    <circle cx="20" cy="30" r="2.5" fill="#AFA9EC" filter="url(#glow)"/>
    <circle cx="25" cy="30" r="2.5" fill="#534AB7" filter="url(#glow)"/>
    <circle cx="30" cy="30" r="2.5" fill="#AFA9EC" filter="url(#glow)"/>
  </g>
  <g class="li" opacity="0">
    <text x="25" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="4.5" font-weight="700" fill="#7F77DD" letter-spacing="0.5" opacity="0.95">ONE SEC</text>
    <circle cx="22" cy="30" r="2.5" fill="#AFA9EC" filter="url(#glow)"/>
    <circle cx="28" cy="30" r="2.5" fill="#534AB7" filter="url(#glow)"/>
  </g>
  <g class="lt" opacity="0">
    <text x="25" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="5.5" font-weight="700" fill="#7F77DD" letter-spacing="1" opacity="0.95">LMAO</text>
    <circle cx="20" cy="30" r="2.5" fill="#AFA9EC" filter="url(#glow)"/>
    <circle cx="25" cy="30" r="2.5" fill="#AFA9EC" filter="url(#glow)"/>
    <circle cx="30" cy="30" r="2.5" fill="#534AB7" filter="url(#glow)"/>
  </g>
  <g class="lh" opacity="0">
    <text x="25" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="4.5" font-weight="700" fill="#7F77DD" letter-spacing="0.5" opacity="0.95">HOL' UP</text>
    <circle cx="20" cy="30" r="2.5" fill="#534AB7" filter="url(#glow)"/>
    <circle cx="25" cy="30" r="2.5" fill="#AFA9EC" filter="url(#glow)"/>
    <circle cx="30" cy="30" r="2.5" fill="#534AB7" filter="url(#glow)"/>
  </g>

  <text x="56" y="30"
    font-family="system-ui, sans-serif"
    font-size="18"
    font-weight="500"
    dominant-baseline="central"
    filter="url(#glow)">
    <tspan fill="#7F77DD" letter-spacing="0.5">Buffering</tspan><tspan font-family="monospace" font-size="14" fill="#AFA9EC" letter-spacing="0.5">.lol</tspan>
  </text>
</svg>
