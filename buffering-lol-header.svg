<svg width="320" height="60" viewBox="0 0 320 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
      @keyframes fadecycle {
        0%,12%   { opacity: 1; }
        18%,88%  { opacity: 0; }
        94%,100% { opacity: 1; }
      }
      .spinner  { transform-origin: 30px 30px; animation: spin 2.4s linear infinite; }
      .spinner2 { transform-origin: 30px 30px; animation: spin-slow 5s linear infinite; }
      .lw { animation: fadecycle 3.2s ease-in-out 0s infinite; }
      .la { animation: fadecycle 3.2s ease-in-out 0.8s infinite; }
      .li { animation: fadecycle 3.2s ease-in-out 1.6s infinite; }
      .lt { animation: fadecycle 3.2s ease-in-out 2.4s infinite; }
      @media (prefers-reduced-motion: reduce) {
        .spinner,.spinner2,.lw,.la,.li,.lt { animation: none; opacity: 1; }
      }
    </style>
  </defs>

  <g class="spinner2">
    <circle cx="30" cy="30" r="26" fill="none" stroke="#3C3489" stroke-width="1"
      stroke-dasharray="4 8" stroke-linecap="round" opacity="0.6"/>
  </g>

  <circle cx="30" cy="30" r="20" fill="none" stroke="#3C3489" stroke-width="4" opacity="0.3"/>

  <g class="spinner" filter="url(#glow)">
    <circle cx="30" cy="30" r="20" fill="none" stroke="#7F77DD" stroke-width="4"
      stroke-dasharray="82 126" stroke-linecap="round" opacity="0.95"/>
  </g>

  <g class="lw">
    <text x="30" y="27" text-anchor="middle" font-family="system-ui,sans-serif" font-size="5.5" font-weight="600" fill="#7F77DD" letter-spacing="1.5" opacity="0.9">WAIT</text>
    <circle cx="22" cy="33" r="2.5" fill="#534AB7" filter="url(#glow)"/>
    <circle cx="30" cy="33" r="2.5" fill="#534AB7" filter="url(#glow)"/>
    <circle cx="38" cy="33" r="2.5" fill="#534AB7" filter="url(#glow)"/>
  </g>

  <g class="la" opacity="0">
    <text x="30" y="27" text-anchor="middle" font-family="system-ui,sans-serif" font-size="5.5" font-weight="600" fill="#7F77DD" letter-spacing="1.5" opacity="0.9">JUST</text>
    <circle cx="24" cy="33" r="2.5" fill="#AFA9EC" filter="url(#glow)"/>
    <circle cx="30" cy="33" r="2.5" fill="#534AB7" filter="url(#glow)"/>
    <circle cx="36" cy="33" r="2.5" fill="#AFA9EC" filter="url(#glow)"/>
  </g>

  <g class="li" opacity="0">
    <text x="30" y="27" text-anchor="middle" font-family="system-ui,sans-serif" font-size="5" font-weight="600" fill="#7F77DD" letter-spacing="0.5" opacity="0.9">ONE SEC</text>
    <circle cx="27" cy="33" r="2.5" fill="#AFA9EC" filter="url(#glow)"/>
    <circle cx="33" cy="33" r="2.5" fill="#534AB7" filter="url(#glow)"/>
  </g>

  <g class="lt" opacity="0">
    <text x="30" y="27" text-anchor="middle" font-family="system-ui,sans-serif" font-size="5.5" font-weight="600" fill="#7F77DD" letter-spacing="1.5" opacity="0.9">LMAO</text>
    <circle cx="24" cy="33" r="2.5" fill="#AFA9EC" filter="url(#glow)"/>
    <circle cx="30" cy="33" r="2.5" fill="#AFA9EC" filter="url(#glow)"/>
    <circle cx="36" cy="33" r="2.5" fill="#534AB7" filter="url(#glow)"/>
  </g>

  <text x="64" y="22" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#7F77DD" letter-spacing="1" filter="url(#glow)">Buffering</text>
  <text x="64" y="42" font-family="monospace" font-size="13" font-weight="400" fill="#AFA9EC" letter-spacing="1">.lol</text>

</svg>
