<svg width="680" height="300" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
      @keyframes fadecycle {
        0%,12%   { opacity: 1; }
        18%,88%  { opacity: 0; }
        94%,100% { opacity: 1; }
      }
      .spinner  { transform-origin: 340px 150px; animation: spin 2.4s linear infinite; }
      .spinner2 { transform-origin: 340px 150px; animation: spin-slow 5s linear infinite; }
      .lw { animation: fadecycle 3.2s ease-in-out 0s infinite; }
      .la { animation: fadecycle 3.2s ease-in-out 0.8s infinite; }
      .li { animation: fadecycle 3.2s ease-in-out 1.6s infinite; }
      .lt { animation: fadecycle 3.2s ease-in-out 2.4s infinite; }
      @keyframes textpulse { 0%,100%{opacity:1} 50%{opacity:0.75} }
      .wordmark { animation: textpulse 3s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        .spinner,.spinner2,.lw,.la,.li,.lt,.wordmark { animation: none; opacity: 1; }
      }
    </style>
  </defs>
  <g class="spinner2">
    <circle cx="340" cy="150" r="88" fill="none" stroke="#3C3489" stroke-width="1.5" stroke-dasharray="6 14" stroke-linecap="round" opacity="0.5"/>
  </g>
  <circle cx="340" cy="150" r="72" fill="none" stroke="#7F77DD" stroke-width="14" opacity="0.12" filter="url(#glow-strong)"/>
  <circle cx="340" cy="150" r="72" fill="none" stroke="#3C3489" stroke-width="10" opacity="0.25"/>
  <g class="spinner" filter="url(#glow)">
    <circle cx="340" cy="150" r="72" fill="none" stroke="#7F77DD" stroke-width="10" stroke-dasharray="300 452" stroke-dashoffset="0" stroke-linecap="round" opacity="0.9"/>
  </g>
  <g class="lw">
    <circle cx="316" cy="150" r="7" fill="#534AB7" filter="url(#glow)"/>
    <circle cx="334" cy="150" r="7" fill="#534AB7" filter="url(#glow)"/>
    <circle cx="352" cy="150" r="7" fill="#534AB7" filter="url(#glow)"/>
    <text x="340" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#7F77DD" letter-spacing="6" opacity="0.8">W A I T</text>
  </g>
  <g class="la" opacity="0">
    <circle cx="322" cy="150" r="7" fill="#AFA9EC" filter="url(#glow)"/>
    <circle cx="340" cy="150" r="7" fill="#534AB7" filter="url(#glow)"/>
    <circle cx="358" cy="150" r="7" fill="#AFA9EC" filter="url(#glow)"/>
    <text x="340" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#7F77DD" letter-spacing="6" opacity="0.8">J U S T</text>
  </g>
  <g class="li" opacity="0">
    <circle cx="331" cy="150" r="7" fill="#AFA9EC" filter="url(#glow)"/>
    <circle cx="349" cy="150" r="7" fill="#534AB7" filter="url(#glow)"/>
    <text x="340" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#7F77DD" letter-spacing="4" opacity="0.8">ONE SEC</text>
  </g>
  <g class="lt" opacity="0">
    <circle cx="322" cy="150" r="7" fill="#AFA9EC" filter="url(#glow)"/>
    <circle cx="340" cy="150" r="7" fill="#AFA9EC" filter="url(#glow)"/>
    <circle cx="358" cy="150" r="7" fill="#534AB7" filter="url(#glow)"/>
    <text x="340" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#7F77DD" letter-spacing="5" opacity="0.8">L M A O</text>
  </g>
  <g class="wordmark" filter="url(#glow)">
    <text x="340" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="38" font-weight="500" fill="#7F77DD" letter-spacing="2">Buffering</text>
    <text x="490" y="255" text-anchor="start" font-family="monospace" font-size="26" font-weight="400" fill="#AFA9EC" letter-spacing="1">.lol</text>
  </g>
</svg>
